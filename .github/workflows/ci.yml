name: Clinical Trials Analyzer CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -v --cov=etl --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clinical-trials-analyzer:test .

      - name: Start PostgreSQL and run ETL
        run: |
          docker compose up -d db
          sleep 8
          docker compose run --rm -e MAX_STUDIES=50 etl

      - name: Verify data loaded
        run: |
          docker compose exec -T db psql -U trials_user -d clinical_trials -c "SELECT COUNT(*) FROM trials;"

      - name: Tear down
        if: always()
        run: docker compose down -v
